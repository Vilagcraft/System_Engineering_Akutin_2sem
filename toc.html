<!DOCTYPE HTML>
<html lang="ru" class="light" dir="ltr">
    <head>
        <!-- sidebar iframe generated using mdBook

        This is a frame, and not included directly in the page, to control the total size of the
        book. The TOC contains an entry for each page, so if each page includes a copy of the TOC,
        the total size of the page becomes O(n**2).

        The frame is only used as a fallback when JS is turned off. When it's on, the sidebar is
        instead added to the main page by `toc.js` instead. The JavaScript mode is better
        because, when running in a `file:///` URL, the iframed page would not be Same-Origin as
        the rest of the page, so the sidebar and the main page theme would fall out of sync.
        -->
        <meta charset="UTF-8">
        <meta name="robots" content="noindex">
        <!-- Custom HTML head -->

        <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
        <script>
          (function() {
            window.addEventListener('load', function() {
              mermaid.initialize({
                startOnLoad: true,
                theme: 'base',
                securityLevel: 'loose',
                flowchart: {
                  useMaxWidth: false,     // ← отключаем ограничение
                  htmlLabels: true,
                  curve: 'basis',
                  padding: 20
                },
                themeVariables: {
                  fontSize: '16px',
                  fontFamily: 'Arial, sans-serif'
                }
              });
              
              mermaid.run({
                querySelector: '.language-mermaid',
                suppressErrors: true
              }).catch(e => console.warn('Mermaid error:', e));
            });
          })();
        </script>
        
        <style>
          /* Стили для диаграмм */
          .language-mermaid {
            background: transparent;
            text-align: center;
            margin: 2em 0;
          }
          
          .mermaid {
            display: flex;
            justify-content: center;
          }
          
          .mermaid svg {
            width: 100%;
            max-width: 1400px;
            height: auto;
            min-width: 700px;
          }
          
          /* Увеличиваем шрифты внутри диаграммы */
          .mermaid .node rect,
          .mermaid .node circle,
          .mermaid .node polygon,
          .mermaid .nodeLabel {
            font-size: 15px !important;
          }
          
          .mermaid .edgeLabel {
            font-size: 13px !important;
          }
          
          .mermaid .cluster-label .label {
            font-size: 17px !important;
            font-weight: bold;
          }
          
          /* Увеличиваем контентную область */
          .content {
            max-width: 1400px !important;
          }
          
          /* Кнопки масштабирования (опционально) */
          .mermaid-toolbar {
            text-align: center;
            margin: 10px 0 20px 0;
          }
          
          .mermaid-toolbar button {
            margin: 0 5px;
            padding: 6px 12px;
            cursor: pointer;
            background: #2b4c66;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
          }
          
          .mermaid-toolbar button:hover {
            background: #1e3a4f;
          }
        </style>
        
        <!-- Кнопки масштабирования -->
        <div class="mermaid-toolbar">
          <button onclick="zoomOut()">🔍− Уменьшить</button>
          <button onclick="resetZoom()">⟳ Сброс</button>
          <button onclick="zoomIn()">🔍+ Увеличить</button>
        </div>
        
        <script>
          function zoomIn() {
            const svgs = document.querySelectorAll('.mermaid svg');
            svgs.forEach(svg => {
              let currentWidth = svg.clientWidth;
              svg.style.width = (currentWidth * 1.2) + 'px';
              svg.style.maxWidth = 'none';
            });
          }
          
          function zoomOut() {
            const svgs = document.querySelectorAll('.mermaid svg');
            svgs.forEach(svg => {
              let currentWidth = svg.clientWidth;
              svg.style.width = Math.max(400, currentWidth * 0.8) + 'px';
            });
          }
          
          function resetZoom() {
            const svgs = document.querySelectorAll('.mermaid svg');
            svgs.forEach(svg => {
              svg.style.width = '';
              svg.style.maxWidth = '';
            });
          }
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#ffffff">
        <link rel="stylesheet" href="css/variables.css">
        <link rel="stylesheet" href="css/general.css">
        <link rel="stylesheet" href="css/chrome.css">
        <link rel="stylesheet" href="css/print.css" media="print">
        <!-- Fonts -->
        <link rel="stylesheet" href="FontAwesome/css/font-awesome.css">
        <link rel="stylesheet" href="fonts/fonts.css">
        <!-- Custom theme stylesheets -->
        <link rel="stylesheet" href="src/_assets/custom.css">
    </head>
    <body class="sidebar-iframe-inner">
        <ol class="chapter"><li class="chapter-item expanded "><a href="task_1.html" target="_parent"><strong aria-hidden="true">1.</strong> task_1</a></li></ol>
    </body>
</html>
